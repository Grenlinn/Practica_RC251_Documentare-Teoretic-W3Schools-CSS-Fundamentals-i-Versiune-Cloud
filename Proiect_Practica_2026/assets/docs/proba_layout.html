<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox & Grid Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'DM Mono', monospace;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
    }

    h2 {
      color: #e8e0d0;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.5;
      align-self: flex-start;
      max-width: 700px;
      width: 100%;
    }

    /* ════════════════════════════════════════════
       A. FLEXBOX CHALLENGE
    ════════════════════════════════════════════ */

    .flex-container {
      width: min(700px, 100%);
      height: 80vh;
      border: 4px double #e8e0d0;
      display: flex;
      flex-wrap: wrap;
      padding: 1.5rem;
      position: relative;
      background: #141414;
    }

    .box-1, .box-2, .box-3 {
      width: 120px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid currentColor;
    }

    /*
      .box-1 → align-self: flex-start
      Suprascrie align-items al containerului doar pentru acest element.
      Îl fixează sus pe axa transversală. Poziția stânga este naturală
      (primul element în flex-direction: row).
    */
    .box-1 {
      align-self: flex-start;
      color: #7ec8a4;
      background: rgba(13, 31, 24, 0.8);
    }

    /*
      .box-2 → position: absolute + top/left: 50% + transform: translate(-50%, -50%)
      Scos din fluxul flex cu position: absolute.
      Singura metodă garantată pentru centru perfect pe AMBELE axe simultan,
      fără a deplasa .box-1 sau .box-3.
    */
    .box-2 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f0c060;
      background: rgba(26, 21, 0, 0.8);
      border-color: #f0c060;
    }

    /*
      .box-3 → margin-top: auto + margin-left: auto
      margin: auto pe o axă absoarbe TOT spațiul liber disponibil
      pe acea direcție, împingând elementul în colțul opus.
      margin-top: auto → împinge jos
      margin-left: auto → împinge la dreapta
    */
    .box-3 {
      margin-top: auto;
      margin-left: auto;
      color: #c084f5;
      background: rgba(22, 13, 31, 0.8);
    }

    .guide-h, .guide-v {
      position: absolute;
      background: rgba(255,255,255,0.03);
      pointer-events: none;
    }
    .guide-h { left: 0; right: 0; top: 50%; height: 1px; }
    .guide-v { top: 0; bottom: 0; left: 50%; width: 1px; }


    /* ════════════════════════════════════════════
       B. GRID CHALLENGE
    ════════════════════════════════════════════ */

    .grid-container {
      width: min(700px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .grid-item {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Primul element ocupă 2 coloane */
    .grid-item-1 {
      grid-column: 1 / 3;
      background: rgba(126, 200, 164, 0.08);
      color: #7ec8a4;
      border-color: rgba(126, 200, 164, 0.2);
    }

    .grid-item-2 {
      background: rgba(240, 192, 96, 0.08);
      color: #f0c060;
      border-color: rgba(240, 192, 96, 0.2);
    }

    .grid-item-3 {
      background: rgba(192, 132, 245, 0.08);
      color: #c084f5;
      border-color: rgba(192, 132, 245, 0.2);
    }

    .grid-item-4 {
      grid-column: 1 / 3;
      background: rgba(100, 160, 240, 0.08);
      color: #64a0f0;
      border-color: rgba(100, 160, 240, 0.2);
    }
  </style>
</head>
<body>

  <h2>A — Flexbox Challenge</h2>

  <div class="flex-container">
    <div class="guide-h"></div>
    <div class="guide-v"></div>
    <div class="box-1">.box-1</div>
    <div class="box-2">.box-2</div>
    <div class="box-3">.box-3</div>
  </div>

  <h2>B — Grid Challenge</h2>

  <div class="grid-container">
    <div class="grid-item grid-item-1">.grid-item-1 — 2 coloane</div>
    <div class="grid-item grid-item-2">.grid-item-2</div>
    <div class="grid-item grid-item-3">.grid-item-3</div>
    <div class="grid-item grid-item-4">.grid-item-4 — 2 coloane</div>
  </div>

</body>
</html>
